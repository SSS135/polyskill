name: Publish

# Auto-publish to npm on every push to main — but only when package.json's
# version is not already on the registry. So ordinary pushes are green no-ops
# and bumping the version is what triggers a release.
#
# Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret. Requires a one-time
# setup that cannot be automated:
#   1. A manual first `npm publish` to create the package (Trusted Publishing
#      can't be configured for a package that doesn't exist yet).
#   2. Registering this repo + workflow as a trusted publisher on npmjs.com
#      (package -> Settings -> Trusted Publisher).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing requires npm >= 11.5.1; ensure we are current.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - name: Decide whether this version needs publishing
        id: guard
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "polyskill@${VERSION}" version >/dev/null 2>&1; then
            echo "polyskill@${VERSION} already on npm — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "polyskill@${VERSION} is new — publishing."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        run: npm publish --provenance --access public
