name: CI

# Validate pull requests and feature-branch pushes. Pushes to main are tested
# by the Publish workflow instead, so they are excluded here to avoid a
# duplicate run.
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
